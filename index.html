<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hero</title>

<!-- Fonts -->
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: hsl(260, 87%, 3%);
  --fg: hsl(40, 6%, 95%);
  --sub: hsl(40, 6%, 82%);
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: sans-serif;
}

.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* VIDEO */
video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 30px;
  z-index: 2;
}

.nav-center {
  display: flex;
  gap: 20px;
}

button {
  background: none;
  border: none;
  color: white;
  cursor: pointer;
}

.btn {
  padding: 8px 16px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
}

/* HERO */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 2;
  text-align: center;
}

h1 {
  font-size: 100px;
  margin: 0;
}

h1 span {
  background: linear-gradient(to left, #6366f1, #a855f7, #fcd34d);
  -webkit-background-clip: text;
  color: transparent;
}

p {
  color: var(--sub);
  max-width: 400px;
}

.cta {
  margin-top: 20px;
  padding: 15px 30px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
}

/* MARQUEE */
.marquee {
  display: flex;
  gap: 40px;
  padding: 20px;
  overflow: hidden;
}

.track {
  display: flex;
  gap: 60px;
  animation: scroll 20s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
</style>
</head>

<body>

<div class="hero">

<!-- VIDEO -->
<video autoplay muted playsinline>
<source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_065045_c44942da-53c6-4804-b734-f9e07fc22e08.mp4" type="video/mp4">
</video>

<!-- NAV -->
<div class="navbar">
<div>LOGO</div>

<div class="nav-center">
<button>Features</button>
<button>Solutions</button>
<button>Plans</button>
<button>Learning</button>
</div>

<button class="btn">Sign Up</button>
</div>

<!-- HERO -->
<div class="content">
<h1>Power <span>AI</span></h1>
<p>The most powerful AI ever deployed in talent acquisition</p>
<button class="cta">Schedule a Consult</button>
</div>

<!-- MARQUEE -->
<div class="marquee">
<div class="track">
<div>Vortex</div>
<div>Nimbus</div>
<div>Prysma</div>
<div>Cirrus</div>
<div>Kynder</div>
<div>Halcyn</div>

<div>Vortex</div>
<div>Nimbus</div>
<div>Prysma</div>
<div>Cirrus</div>
<div>Kynder</div>
<div>Halcyn</div>
</div>
</div>

</div>

<script>
const video = document.querySelector("video");

video.addEventListener("play", () => {
  video.style.opacity = 0;
  let start = null;

  function fadeIn(t) {
    if (!start) start = t;
    let p = (t - start) / 500;
    video.style.opacity = Math.min(p, 1);
    if (p < 1) requestAnimationFrame(fadeIn);
  }

  requestAnimationFrame(fadeIn);
});

video.addEventListener("ended", () => {
  let start = null;

  function fadeOut(t) {
    if (!start) start = t;
    let p = (t - start) / 500;
    video.style.opacity = 1 - Math.min(p, 1);

    if (p < 1) {
      requestAnimationFrame(fadeOut);
    } else {
      video.style.opacity = 0;
      setTimeout(() => {
        video.currentTime = 0;
        video.play();
      }, 100);
    }
  }

  requestAnimationFrame(fadeOut);
});
</script>

</body>
</html>
